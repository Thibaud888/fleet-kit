# Workflow réutilisable : le dispatch par issues.
# Issue labellisée `claude` (ou commentaire `@claude`) → session Claude dans Actions → PR.
# Appelé par le stub templates/common/.github/workflows/claude.yml de chaque repo.
#
# SÉCURITÉ : seul github.actor == 'Thibaud888' déclenche — indispensable sur les repos
# publics (une issue d'un inconnu ne doit JAMAIS lancer une session).
name: Claude dispatch

on:
  workflow_call:
    inputs:
      default_model:
        description: "Modèle par défaut pour les issues qui codent"
        type: string
        default: "claude-sonnet-5"
      max_turns:
        type: string
        # 80 : marge pour les demandes conséquentes (explorer + implémenter sur plusieurs
        # fichiers + vérifier + ouvrir la PR en une seule session). 40 était trop court et
        # coupait des sessions en plein travail (« reached maximum number of turns »).
        # Au-delà de ~80-100, mieux vaut découper la demande que grossir le plafond.
        default: "80"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false

concurrency:
  group: claude-${{ github.repository }}
  cancel-in-progress: false

jobs:
  claude:
    # Garde : auteur = Thibaud888, et l'événement est bien un ajout du label `claude`
    # ou un commentaire contenant `@claude`.
    if: >-
      github.actor == 'Thibaud888' && (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude') ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Choisir le modèle (labels claude:haiku / claude:opus / claude:fable)
        id: model
        run: |
          if ${{ contains(github.event.issue.labels.*.name, 'claude:haiku') }}; then
            echo "model=claude-haiku-4-5-20251001" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.issue.labels.*.name, 'claude:opus') }}; then
            echo "model=claude-opus-4-8" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.issue.labels.*.name, 'claude:fable') }}; then
            echo "model=claude-fable-5" >> "$GITHUB_OUTPUT"
          else
            echo "model=${{ inputs.default_model }}" >> "$GITHUB_OUTPUT"
          fi

      # Repère temporel : sert au contrôle de sortie à distinguer ce que CETTE session a
      # écrit sur l'issue d'un commentaire laissé par un run précédent.
      - name: Horodatage de départ
        id: t0
        if: github.event_name == 'issues'
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Cas 1 — label `claude` posé sur une issue : mode agent, prompt explicite.
      - name: Session Claude (issue labellisée)
        if: github.event_name == 'issues'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pas d'anthropic_api_key : la flotte tourne UNIQUEMENT sur l'abonnement (OAuth).
          # La transmettre ferait facturer les sessions en crédits API sur les repos qui
          # définissent ce secret pour leur propre app (ex. recherche-emploi). On n'y touche pas.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Traite l'issue #${{ github.event.issue.number }} : « ${{ github.event.issue.title }} ».

            Corps de l'issue (c'est le cahier des charges, avec sa definition of done) :
            ---
            ${{ github.event.issue.body }}
            ---

            Règles :
            1. Lis MAP.md et CLAUDE.md d'abord ; n'explore que ce qu'ils ne couvrent pas.
            2. Travaille sur une branche `claude/issue-${{ github.event.issue.number }}`.
            3. Vérifie ton travail avant de conclure (script verify du repo s'il existe, sinon tests/build).
            4. Pousse la branche et ouvre une PR en français avec `gh pr create`, corps contenant
               `Closes #${{ github.event.issue.number }}`.
            5. Commente l'issue avec le lien de la PR et un résumé de 3 lignes.
            Si l'issue est ambiguë ou infaisable, ne code pas : commente l'issue en expliquant pourquoi.
          claude_args: "--model ${{ steps.model.outputs.model }} --max-turns ${{ inputs.max_turns }} --allowedTools 'Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(python:*),Bash(python3:*),Bash(pip:*),Bash(pip3:*),Bash(pytest:*),Edit,Write,Read,Glob,Grep'"

      # Merge auto : dès que la PR ouverte par Claude a une CI verte, on la merge (squash) —
      # plus d'attente de relecture par défaut. Filet de sécurité gardé : CI rouge => PR laissée
      # ouverte, jamais mergée à l'aveugle. Opt-out par repo : fichier `.claude/no-auto-merge`.
      - name: Merge automatique si CI verte
        if: github.event_name == 'issues'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="claude/issue-${{ github.event.issue.number }}"
          pr=$(gh pr list --repo ${{ github.repository }} --head "$branch" --state open --json number --jq '.[0].number')
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "Pas de PR ouverte sur $branch, rien à merger."
            exit 0
          fi
          if [ -f .claude/no-auto-merge ]; then
            gh pr comment "$pr" --repo ${{ github.repository }} \
              --body "Auto-merge désactivé pour ce repo (\`.claude/no-auto-merge\`) — PR laissée pour relecture."
            exit 0
          fi
          n_checks=$(gh pr checks "$pr" --repo ${{ github.repository }} --json name --jq 'length' 2>/dev/null || echo 0)
          if [ "$n_checks" != "0" ]; then
            if ! gh pr checks "$pr" --repo ${{ github.repository }} --watch --interval 15; then
              gh pr comment "$pr" --repo ${{ github.repository }} \
                --body "Checks CI en échec — PR laissée ouverte pour relecture (pas de merge automatique)."
              exit 0
            fi
          fi
          # Un draft ne peut pas être mergé (GitHub renvoie 405). Si la PR est restée en
          # brouillon (p.ex. ouverte par une session web), on la passe « ready » avant merge —
          # sans quoi le merge auto échouerait en silence (continue-on-error).
          gh pr ready "$pr" --repo ${{ github.repository }} 2>/dev/null || true
          gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch

      # Contrôle de sortie — SANS continue-on-error : c'est le seul garde-fou qui peut
      # rendre le job rouge. Une session qui ne produit NI PR NI explication est un échec
      # silencieux : le run sort vert (l'étape de merge ci-dessus fait `exit 0` sur
      # « rien à merger »), l'item paraît traité, et personne ne le voit sans contrôle
      # manuel. Vécu 2× le 2026-07-17 sur activites-vallauriennes (#15 et #16) : branche
      # poussée, aucune PR, run vert, `is_error: false`.
      # Un refus motivé reste un SUCCÈS : le prompt demande explicitement de commenter
      # l'issue plutôt que de coder quand elle est ambiguë ou infaisable.
      - name: Contrôle — la session a-t-elle abouti ?
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="${{ github.event.issue.number }}"
          branch="claude/issue-$issue"
          # --state all : après un merge auto, la PR est mergée et la branche supprimée.
          pr=$(gh pr list --repo ${{ github.repository }} --head "$branch" --state all \
                 --json number --jq '.[0].number // empty')
          if [ -n "$pr" ]; then
            echo "PR #$pr produite sur $branch."
            exit 0
          fi
          # Pas de PR : acceptable uniquement si la session a dit pourquoi, pendant CE run.
          n=$(gh api "repos/${{ github.repository }}/issues/$issue/comments" \
                --jq '[.[] | select(.user.login == "github-actions[bot]")
                          | select(.created_at >= "${{ steps.t0.outputs.ts }}")] | length')
          if [ "${n:-0}" -gt 0 ]; then
            echo "::warning::Aucune PR produite, mais la session a motivé son refus sur l'issue #$issue."
            exit 0
          fi
          echo "::error::Échec silencieux : session terminée sans PR et sans explication sur l'issue #$issue."
          echo "Vérifier la branche $branch (poussée sans PR ?) et les logs de la session ci-dessus."
          exit 1

      # Cas 2 — commentaire `@claude` (sur issue ou PR) : mode interactif standard de l'action.
      - name: Session Claude (mention @claude)
        if: github.event_name == 'issue_comment'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pas d'anthropic_api_key : la flotte tourne UNIQUEMENT sur l'abonnement (OAuth).
          # La transmettre ferait facturer les sessions en crédits API sur les repos qui
          # définissent ce secret pour leur propre app (ex. recherche-emploi). On n'y touche pas.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Mêmes outils que le Cas 1 : sans `--allowedTools`, la session déclenchée par
          # commentaire n'a ni `gh` ni `python` (le `.claude/settings.json` du repo n'est pas
          # honoré ici, seuls les `--allowedTools` de `claude_args` font foi). Elle ne peut donc
          # ni ouvrir la PR ni lancer la vérification, et retombe sur un simple lien « Create PR ».
          # C'est ce qui bloquait les cadrages « GO » et le bouton « Demander des changements » de
          # FleetView. On rétablit l'outillage et on rappelle à Claude d'ouvrir lui-même la PR
          # quand il a implémenté sur une branche (il ne peut pas merger : limite volontaire de
          # l'action — la PR reste ouverte pour relecture humaine).
          # NB : on liste `python` ET `python3` (idem `pip`/`pip3`) — un motif `Bash(python:*)`
          # NE couvre PAS `python3 …`, et Claude tape souvent `python3 scripts/verify.py`, ce qui
          # retombait sinon sur « This command requires approval » (headless = blocage définitif).
          claude_args: >-
            --model ${{ steps.model.outputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools 'Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(python:*),Bash(python3:*),Bash(pip:*),Bash(pip3:*),Bash(pytest:*),Edit,Write,Read,Glob,Grep'
            --append-system-prompt 'Quand tu as implémenté des changements sur une branche sans pull request associée, ouvre la PR toi-même avec gh pr create (titre et corps en français, avec Closes #<n> quand une issue est liée), puis commente le fil avec le lien. Tu ne peux pas merger ni rebaser (limitation volontaire) : laisse la PR ouverte pour relecture.'
