# Workflow réutilisable : CI standard Python (ruff + pytest, si présents).
name: CI Python

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Lint (ruff, si configuré)
        run: |
          if pip show ruff > /dev/null 2>&1 || [ -f ruff.toml ] || grep -q "\[tool.ruff\]" pyproject.toml 2>/dev/null; then
            pip install ruff > /dev/null
            ruff check .
          else
            echo "ruff non configuré — étape sautée."
          fi
      - name: Tests (pytest, si présents)
        run: |
          if [ -d tests ] || ls test_*.py > /dev/null 2>&1; then
            pip install pytest > /dev/null
            pytest -q
          else
            echo "pas de tests — étape sautée."
          fi
