# Stub flotte : dispatch Claude par issue labellisée `claude` ou commentaire `@claude`
# (logique et garde-fous dans dispatch.yml, juste à côté — le kit s'équipe lui-même).
name: Claude
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
jobs:
  dispatch:
    uses: Thibaud888/fleet-kit/.github/workflows/dispatch.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
