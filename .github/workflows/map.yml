# Workflow réutilisable : régénère MAP.md, la carte du repo lue par les sessions Claude
# (élimine l'exploration répétée : la session lit ~2k tokens au lieu d'en brûler 30-80k).
# Appelé par le stub templates/common/.github/workflows/map.yml de chaque repo.
#
# GARDE ANTI-GASPILLAGE (2026-07-11) : la session Claude ne tourne que si le diff depuis la
# dernière régénération le justifie — fichiers ajoutés/supprimés/renommés, fichiers « clés »
# (package.json, workflows, scripts…) touchés, ou refonte massive (> 400 lignes). Sinon le
# run se termine sans consommer un token. Quand elle tourne, la session reçoit le résumé du
# diff pour mettre à jour la carte au lieu de ré-explorer tout le repo.
# `workflow_dispatch` force toujours la régénération.
#
# NB : on invoque le CLI Claude Code directement (et PAS anthropics/claude-code-action) :
# l'action refuse les événements `push` (« Unsupported event type: push »), le CLI est
# indifférent à l'événement. Constaté le 2026-07-10 sur les 9 MAP post-merge.
name: MAP — carte du repo

on:
  workflow_call:
    inputs:
      model:
        description: "Modèle Claude (mécanique → Haiku)"
        type: string
        default: "claude-haiku-4-5-20251001"
      max_turns:
        type: string
        default: "15"
      seuil_lignes:
        description: "Au-delà de ce total de lignes modifiées, on régénère même sans changement structurel"
        type: string
        default: "400"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false

concurrency:
  group: map-${{ github.repository }}
  cancel-in-progress: true

jobs:
  map:
    # push déclenché par le commit de MAP.md lui-même → déjà exclu par paths-ignore du stub,
    # ceinture supplémentaire : [skip map] dans le message de commit.
    if: ${{ !contains(github.event.head_commit.message || '', '[skip map]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Garde — la carte doit-elle être régénérée ?
        id: gate
        run: |
          decide() { echo "run=$1" >> "$GITHUB_OUTPUT"; echo "Garde MAP : $1 — $2"; }

          if [ ! -f MAP.md ]; then decide true "MAP.md absente"; exit 0; fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            decide true "déclenchement manuel"; exit 0
          fi

          base=$(git log -1 --format=%H -- MAP.md || true)
          if [ -z "$base" ]; then decide true "MAP.md jamais commitée"; exit 0; fi

          # 1) Changements structurels : fichiers ajoutés / supprimés / renommés / copiés
          structurel=$(git diff --name-status --diff-filter=ADRC "$base"..HEAD -- . ':!MAP.md' || true)
          # 2) Fichiers « clés » qui pilotent les sections Commandes / Pièges de la carte
          cles=$(git diff --name-only "$base"..HEAD -- \
            package.json pyproject.toml requirements.txt requirements-dev.txt \
            '.github/workflows' scripts 2>/dev/null | grep -v '^MAP.md$' || true)
          # 3) Ampleur totale du diff (refonte sans création de fichier)
          lignes=$(git diff --numstat "$base"..HEAD -- . ':!MAP.md' \
            | awk '$1 != "-" {a += $1 + $2} END {print a + 0}')

          # Résumé du diff pour le prompt (utilisé seulement si on régénère)
          {
            echo "Fichiers ajoutés (A) / supprimés (D) / renommés (R) depuis la dernière carte :"
            if [ -n "$structurel" ]; then echo "$structurel" | head -80; else echo "(aucun)"; fi
            echo ""
            echo "Fichiers modifiés (ampleur) :"
            git diff --stat "$base"..HEAD -- . ':!MAP.md' | tail -60
          } > /tmp/diff-map.txt

          if [ -n "$structurel" ]; then decide true "changement structurel de fichiers"; exit 0; fi
          if [ -n "$cles" ]; then decide true "fichier clé modifié : $(echo "$cles" | head -5 | tr '\n' ' ')"; exit 0; fi
          if [ "$lignes" -gt "${{ inputs.seuil_lignes }}" ]; then
            decide true "diff massif ($lignes lignes > ${{ inputs.seuil_lignes }})"; exit 0
          fi
          decide false "diff mineur ($lignes lignes, ni structure ni fichier clé) — 0 token consommé"

      - name: Installer Claude Code
        if: steps.gate.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Régénérer MAP.md
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > /tmp/prompt-map.md << 'FIN_PROMPT'
          Régénère le fichier MAP.md à la racine de ce repo (crée-le s'il n'existe pas).
          MAP.md est la carte que lira chaque future session Claude Code AVANT d'explorer :
          optimise-la pour ça, en français, 150 lignes maximum.

          Structure imposée :
          1. **Quoi** — le projet en 2 phrases.
          2. **Arborescence annotée** — dossiers/fichiers clés seulement, un commentaire par ligne.
          3. **Points d'entrée** — par où commencer pour les modifications courantes
             (« pour toucher X, va dans Y »).
          4. **Flux de données** — comment l'info circule (5 lignes max).
          5. **Commandes** — dev / test / build / deploy, exactes.
          6. **Pièges connus** — ce qui surprend (conventions, hacks, dépendances fragiles).

          Si la MAP.md existante est déjà exacte et à jour, ne la modifie pas.
          Sois factuel et dense. Ne modifie AUCUN autre fichier que MAP.md.
          FIN_PROMPT
          if [ -f /tmp/diff-map.txt ] && [ -f MAP.md ]; then
            {
              echo ""
              echo "## Ce qui a changé depuis la dernière régénération de la carte"
              echo '```'
              cat /tmp/diff-map.txt
              echo '```'
              echo "Pars de la MAP.md existante et mets à jour UNIQUEMENT les sections impactées"
              echo "par ces changements. Ne ré-explore pas les zones non touchées que la carte"
              echo "décrit déjà correctement."
            } >> /tmp/prompt-map.md
          fi
          claude -p "$(cat /tmp/prompt-map.md)" \
            --model "${{ inputs.model }}" \
            --max-turns "${{ inputs.max_turns }}" \
            --allowedTools "Read,Glob,Grep,Write"

      - name: Commiter si la carte a changé
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ -n "$(git status --porcelain MAP.md)" ]; then
            git config user.name "fleet-kit-map[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add MAP.md
            git commit -m "carte: régénère MAP.md [skip ci] [skip map]"
            git push
            echo "MAP.md mise à jour."
          else
            echo "MAP.md inchangée."
          fi
